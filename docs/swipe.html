<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Atriveo — Swipe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #08101a;
      --bg2: #0c1624;
      --surface: rgba(15, 27, 42, 0.96);
      --line: #24374f;
      --line-soft: rgba(70, 96, 125, 0.35);
      --text: #e9f1fb;
      --muted: #8fa4be;
      --teal: #34d3c4;
      --radius-lg: 20px;
      --radius-sm: 10px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: "Sora", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 0%, rgba(52,211,196,0.18) 0, transparent 40%),
        radial-gradient(circle at 80% 10%, rgba(255,171,94,0.15) 0, transparent 40%),
        linear-gradient(160deg, var(--bg) 0%, var(--bg2) 100%);
    }

    /* ── Layout ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 16px 20px;
    }

    /* ── Header ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0 10px;
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-mark {
      width: 30px; height: 30px; border-radius: 8px;
      display: grid; place-items: center;
      font-weight: 800; font-size: 12px; color: #04231f;
      background: linear-gradient(145deg, #5bf0e2 0%, #32c8bc 100%);
    }

    .brand-name {
      font-size: 15px;
      font-weight: 700;
    }

    .skip-link {
      font-size: 12px;
      color: var(--muted);
      font-family: "IBM Plex Mono", monospace;
      text-decoration: none;
      border: 1px solid var(--line-soft);
      border-radius: 999px;
      padding: 5px 12px;
      transition: color 140ms, border-color 140ms;
    }

    .skip-link:hover { color: var(--text); border-color: var(--teal); }

    /* ── Progress ── */
    .progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      margin-bottom: 10px;
    }

    .progress-bar {
      flex: 1;
      height: 4px;
      background: var(--line);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #34d3c4, #62eee1);
      border-radius: 999px;
      transition: width 300ms ease;
    }

    .progress-label {
      font-size: 11px;
      font-family: "IBM Plex Mono", monospace;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── Card stack ── */
    .card-stack {
      position: relative;
      flex: 1;
      min-height: 0;
    }

    .job-card {
      position: absolute;
      inset: 0;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      cursor: grab;
      user-select: none;
      touch-action: none;
      overflow-y: auto;
      will-change: transform;
      transition: box-shadow 200ms ease;
      backdrop-filter: blur(16px);
      box-shadow: 0 24px 56px rgba(2, 8, 15, 0.5);
    }

    .job-card:active { cursor: grabbing; }

    /* next card peeking behind */
    .job-card.next {
      transform: scale(0.94) translateY(12px);
      z-index: 0;
      pointer-events: none;
      opacity: 0.6;
    }

    .job-card.current { z-index: 1; }

    /* swipe overlays */
    .overlay-right, .overlay-left {
      position: absolute;
      inset: 0;
      border-radius: var(--radius-lg);
      opacity: 0;
      pointer-events: none;
      transition: opacity 80ms linear;
      z-index: 2;
      display: flex;
      align-items: flex-start;
      padding: 24px;
    }

    .overlay-right { background: linear-gradient(135deg, rgba(57,217,138,0.35), transparent 60%); }
    .overlay-left  { background: linear-gradient(225deg, rgba(255,80,80,0.35), transparent 60%); justify-content: flex-end; }

    .overlay-label {
      font-size: 28px;
      font-weight: 800;
      border: 3px solid;
      border-radius: 8px;
      padding: 4px 14px;
      transform: rotate(-12deg);
      letter-spacing: 0.06em;
    }

    .overlay-right .overlay-label { color: #52d98a; border-color: #52d98a; transform: rotate(-12deg); }
    .overlay-left  .overlay-label { color: #ff6464; border-color: #ff6464; transform: rotate(12deg); }

    /* ── Card internals ── */
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .card-avatar {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 18px;
      flex-shrink: 0;
    }

    .card-score {
      font-size: 13px;
      font-weight: 700;
      font-family: "IBM Plex Mono", monospace;
      border-radius: 999px;
      padding: 4px 12px;
    }

    .card-score.high   { color: #5ee8a8; background: rgba(57,217,138,0.15);  border: 1px solid rgba(57,217,138,0.4); }
    .card-score.medium { color: #ffd066; background: rgba(255,200,66,0.15);  border: 1px solid rgba(255,200,66,0.4); }
    .card-score.low    { color: #ff9494; background: rgba(255,100,100,0.15); border: 1px solid rgba(255,100,100,0.4); }

    .card-title {
      font-size: 19px;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
    }

    .card-company {
      font-size: 14px;
      font-weight: 600;
      color: var(--teal);
    }

    .card-location {
      font-size: 12px;
      color: var(--muted);
      font-family: "IBM Plex Mono", monospace;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .divider {
      height: 1px;
      background: var(--line);
      border-radius: 1px;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      height: 26px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      font-family: "IBM Plex Mono", monospace;
      padding: 0 10px;
      white-space: nowrap;
    }

    .badge-level-newgrad { color: #52d98a; background: rgba(57,217,138,0.12); }
    .badge-level-entry   { color: #5bc8f5; background: rgba(94,201,255,0.12); }
    .badge-level-mid     { color: #f5b85a; background: rgba(255,171,94,0.14); }
    .badge-level-unknown { color: #7a93b0; background: rgba(122,147,176,0.1); }

    .badge-match-high   { color: #52d98a; background: rgba(57,217,138,0.12); }
    .badge-match-medium { color: #f5c842; background: rgba(245,200,66,0.12); }
    .badge-match-low    { color: #f5806a; background: rgba(245,128,106,0.12); }

    .badge-exp  { color: #7ab8f5; background: rgba(96,166,255,0.12); }
    .badge-comp-low    { color: #52d98a; background: rgba(57,217,138,0.12); }
    .badge-comp-medium { color: #f5c842; background: rgba(245,200,66,0.12); }
    .badge-comp-high   { color: #f5806a; background: rgba(245,128,106,0.12); }

    .badge-site { color: var(--muted); background: rgba(143,164,190,0.1); }

    .detail-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .detail-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
    }

    .detail-label {
      color: var(--muted);
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .detail-value {
      font-weight: 600;
      font-size: 13px;
    }

    .posted-time {
      font-size: 11px;
      color: var(--muted);
      font-family: "IBM Plex Mono", monospace;
      margin-top: auto;
      padding-top: 6px;
    }

    /* ── Action buttons ── */
    .actions {
      display: flex;
      gap: 16px;
      flex-shrink: 0;
      padding-top: 4px;
    }

    .btn-nope, .btn-like {
      flex: 1;
      height: 60px;
      border-radius: 16px;
      border: none;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 120ms ease, box-shadow 120ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-nope:active, .btn-like:active { transform: scale(0.94); }

    .btn-nope {
      background: rgba(255, 80, 80, 0.12);
      border: 2px solid rgba(255, 80, 80, 0.4);
      color: #ff6464;
      box-shadow: 0 8px 24px rgba(255, 80, 80, 0.1);
    }

    .btn-nope:hover { background: rgba(255,80,80,0.2); box-shadow: 0 8px 28px rgba(255,80,80,0.2); }

    .btn-like {
      background: rgba(57, 217, 138, 0.12);
      border: 2px solid rgba(57, 217, 138, 0.4);
      color: #52d98a;
      box-shadow: 0 8px 24px rgba(57, 217, 138, 0.1);
    }

    .btn-like:hover { background: rgba(57,217,138,0.2); box-shadow: 0 8px 28px rgba(57,217,138,0.2); }

    .btn-label {
      font-size: 13px;
      font-family: "IBM Plex Mono", monospace;
      font-weight: 600;
    }

    /* ── Empty / Loading / Error states ── */
    .state-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 24px;
    }

    .state-icon { font-size: 56px; }

    .state-title {
      font-size: 22px;
      font-weight: 700;
    }

    .state-sub {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      font-family: "IBM Plex Mono", monospace;
    }

    .state-btn {
      margin-top: 8px;
      padding: 12px 28px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(145deg, #62eee1, #35c9bb);
      color: #02211d;
      font-size: 14px;
      font-weight: 700;
      font-family: "IBM Plex Mono", monospace;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    /* ── Desktop tweaks ── */
    @media (min-width: 600px) {
      .app {
        padding: 0 0 28px;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.18;
        background-image:
          linear-gradient(to right, rgba(143,164,190,0.08) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(143,164,190,0.08) 1px, transparent 1px);
        background-size: 48px 48px;
      }

      .topbar { padding: 20px 0 12px; }

      .card-title { font-size: 21px; }

      .btn-nope, .btn-like { height: 64px; }
    }
  </style>
</head>
<body>

<div class="app" id="app">

  <!-- Header -->
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">A</div>
      <div class="brand-name">Atriveo</div>
    </div>
    <a href="index.html" class="skip-link">Skip →</a>
  </div>

  <!-- Loading -->
  <div class="state-screen" id="screen-loading">
    <div class="state-icon">⏳</div>
    <div class="state-title">Loading today's jobs…</div>
    <div class="state-sub">Fetching your queue from MongoDB</div>
  </div>

  <!-- Error -->
  <div class="state-screen" id="screen-error" style="display:none">
    <div class="state-icon">⚠️</div>
    <div class="state-title">Couldn't load jobs</div>
    <div class="state-sub" id="error-msg">Check that the API is running.</div>
    <button class="state-btn" onclick="location.reload()">Retry</button>
  </div>

  <!-- All done -->
  <div class="state-screen" id="screen-done" style="display:none">
    <div class="state-icon">🎉</div>
    <div class="state-title">All caught up!</div>
    <div class="state-sub">No more jobs to review for today.<br>Redirecting to your picks…</div>
  </div>

  <!-- Swipe UI -->
  <div id="swipe-ui" style="display:none; flex:1; display:none; flex-direction:column; gap:0; min-height:0;">

    <!-- Progress -->
    <div class="progress-row">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-label" id="progress-label">-- left</div>
    </div>

    <!-- Card stack -->
    <div class="card-stack" id="card-stack"></div>

    <!-- Buttons -->
    <div class="actions">
      <button class="btn-nope" id="btn-nope" onclick="swipe('left')">
        <span>✕</span><span class="btn-label">Skip</span>
      </button>
      <button class="btn-like" id="btn-like" onclick="swipe('right')">
        <span class="btn-label">Save</span><span>✓</span>
      </button>
    </div>

  </div>

</div>

<script>
  // ── Config ────────────────────────────────────────────────────────────────
  // Replace with your Render URL once deployed
  const API_BASE = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1")
    ? "http://localhost:8000"
    : "https://swipe-api-NAMESPACE.apps.CLUSTER.openshiftapps.com";

  // ── State ─────────────────────────────────────────────────────────────────
  let queue = [];
  let total = 0;
  let currentIdx = 0;
  let isSwiping = false;

  // ── Helpers ───────────────────────────────────────────────────────────────
  const ESCAPE_MAP = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" };
  function esc(v) { return String(v ?? "").replace(/[&<>"']/g, c => ESCAPE_MAP[c]); }

  function safeUrl(v) {
    if (!v) return null;
    try {
      const p = new URL(v);
      return (p.protocol === "http:" || p.protocol === "https:") ? p.toString() : null;
    } catch { return null; }
  }

  function todayLocal() {
    return new Date().toLocaleDateString("en-CA");
  }

  function formatPosted(v) {
    if (!v) return "--";
    const d = new Date(v);
    if (isNaN(d)) return "--";
    const h = Math.floor((Date.now() - d.getTime()) / 3_600_000);
    if (h >= 0 && h < 24) return h === 0 ? "just now" : `${h}h ago`;
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
  }

  function scoreClass(s) {
    return s >= 5 ? "high" : s >= 2 ? "medium" : "low";
  }

  const AVATAR_PAL = [
    { bg: "rgba(34,189,140,0.2)",  color: "#5ee8a8" },
    { bg: "rgba(94,180,255,0.2)",  color: "#5bc8f5" },
    { bg: "rgba(255,160,80,0.2)",  color: "#ffc57d" },
    { bg: "rgba(200,130,255,0.2)", color: "#c57dff" },
    { bg: "rgba(52,211,196,0.2)",  color: "#62eee1" },
    { bg: "rgba(255,200,66,0.2)",  color: "#f5e87d" },
    { bg: "rgba(255,120,120,0.2)", color: "#ff8a8a" },
    { bg: "rgba(160,200,255,0.2)", color: "#9bc8ff" },
  ];

  function avatarPal(company) {
    const code = (company || "?").toUpperCase().charCodeAt(0);
    return AVATAR_PAL[code % AVATAR_PAL.length];
  }

  function numberOr(v, fb = 0) { const n = Number(v); return isFinite(n) ? n : fb; }

  // ── Render card HTML ──────────────────────────────────────────────────────
  function buildCard(job) {
    const score = numberOr(job.score, 0);
    const scoreCls = scoreClass(score);
    const pal = avatarPal(job.company);
    const initial = (job.company || "?")[0].toUpperCase();

    const level = job.level || "";
    const lvlCls = { "New Grad": "badge-level-newgrad", "Entry": "badge-level-entry", "Mid": "badge-level-mid" }[level] || "badge-level-unknown";
    const lvlLabel = level || "Unknown";

    const match = Math.max(0, Math.round(numberOr(job.score_pct, 0)));
    const matchCls = match >= 70 ? "badge-match-high" : match >= 40 ? "badge-match-medium" : "badge-match-low";

    const mn = job.min_exp != null ? numberOr(job.min_exp, 0) : null;
    const mx = job.max_exp != null ? numberOr(job.max_exp, mn ?? 0) : mn;
    const expLabel = mn != null ? (mx != null && mx > mn ? `${mn}–${mx}y` : `${mn}y`) : null;

    const comp = numberOr(job.competition_score, 0);
    const compCls = comp >= 7 ? "badge-comp-high" : comp >= 4 ? "badge-comp-medium" : "badge-comp-low";
    const compLabel = comp >= 7 ? "High competition" : comp >= 4 ? "Medium competition" : "Low competition";

    const site = job.site ? esc(job.site) : null;
    const posted = formatPosted(job.date_posted);

    return `
      <div class="overlay-right"><span class="overlay-label">SAVE</span></div>
      <div class="overlay-left"><span class="overlay-label">SKIP</span></div>

      <div class="card-header">
        <div class="card-avatar" style="background:${pal.bg};color:${pal.color}">${initial}</div>
        <span class="card-score ${scoreCls}">★ ${score}</span>
      </div>

      <div class="card-title">${esc(job.title || "Untitled role")}</div>
      <div class="card-company">${esc(job.company || "—")}</div>
      ${job.location ? `<div class="card-location">📍 ${esc(job.location)}</div>` : ""}

      <div class="divider"></div>

      <div class="badge-row">
        <span class="badge ${lvlCls}">${esc(lvlLabel)}</span>
        <span class="badge ${matchCls}">${match}% match</span>
        ${expLabel ? `<span class="badge badge-exp">${esc(expLabel)} exp</span>` : ""}
        ${site ? `<span class="badge badge-site">${site}</span>` : ""}
      </div>

      <div class="detail-row">
        <div class="detail-item">
          <span class="detail-label">Competition</span>
          <span class="detail-value"><span class="badge ${compCls}">${esc(compLabel)}</span></span>
        </div>
      </div>

      <div class="posted-time">Posted ${posted}</div>
    `;
  }

  // ── DOM ───────────────────────────────────────────────────────────────────
  function show(id) {
    ["screen-loading", "screen-error", "screen-done", "swipe-ui"].forEach(s => {
      const el = document.getElementById(s);
      if (el) el.style.display = s === id ? (s === "swipe-ui" ? "flex" : "flex") : "none";
    });
    if (id === "swipe-ui") {
      document.getElementById("swipe-ui").style.flexDirection = "column";
    }
  }

  function updateProgress() {
    const remaining = queue.length - currentIdx;
    const pct = total > 0 ? ((total - remaining) / total) * 100 : 0;
    document.getElementById("progress-fill").style.width = `${pct}%`;
    document.getElementById("progress-label").textContent = `${remaining} left`;
  }

  function renderStack() {
    const stack = document.getElementById("card-stack");
    stack.innerHTML = "";

    // next card (behind)
    if (currentIdx + 1 < queue.length) {
      const next = document.createElement("div");
      next.className = "job-card next";
      next.innerHTML = buildCard(queue[currentIdx + 1]);
      stack.appendChild(next);
    }

    // current card
    if (currentIdx < queue.length) {
      const card = document.createElement("div");
      card.className = "job-card current";
      card.innerHTML = buildCard(queue[currentIdx]);
      stack.appendChild(card);
      attachDrag(card);
    }
  }

  // ── Swipe logic ───────────────────────────────────────────────────────────
  async function swipe(direction) {
    if (isSwiping || currentIdx >= queue.length) return;
    isSwiping = true;

    const job = queue[currentIdx];
    const card = document.querySelector(".job-card.current");

    if (card) {
      const dx = direction === "right" ? window.innerWidth : -window.innerWidth;
      card.style.transition = "transform 320ms ease, opacity 320ms ease";
      card.style.transform = `translateX(${dx}px) rotate(${direction === "right" ? 15 : -15}deg)`;
      card.style.opacity = "0";
    }

    // fire-and-forget POST
    fetch(`${API_BASE}/api/swipe`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ job_url: job.job_url, direction, date: todayLocal() }),
    }).catch(() => {});

    await new Promise(r => setTimeout(r, 300));
    currentIdx++;
    isSwiping = false;

    if (currentIdx >= queue.length) {
      show("screen-done");
      setTimeout(() => { window.location.href = "index.html"; }, 2200);
    } else {
      updateProgress();
      renderStack();
    }
  }

  // ── Drag / touch ──────────────────────────────────────────────────────────
  function attachDrag(card) {
    let startX = 0, currentX = 0, dragging = false;
    const THRESHOLD = 80;

    const overlayRight = card.querySelector(".overlay-right");
    const overlayLeft  = card.querySelector(".overlay-left");

    function onStart(x) {
      if (isSwiping) return;
      startX = x; currentX = x; dragging = true;
      card.style.transition = "none";
    }

    function onMove(x) {
      if (!dragging) return;
      currentX = x;
      const dx = currentX - startX;
      const rot = dx / 18;
      card.style.transform = `translateX(${dx}px) rotate(${rot}deg)`;
      const frac = Math.min(Math.abs(dx) / THRESHOLD, 1);
      if (dx > 0) {
        overlayRight.style.opacity = frac * 0.9;
        overlayLeft.style.opacity  = 0;
      } else {
        overlayLeft.style.opacity  = frac * 0.9;
        overlayRight.style.opacity = 0;
      }
    }

    function onEnd() {
      if (!dragging) return;
      dragging = false;
      const dx = currentX - startX;
      overlayRight.style.opacity = 0;
      overlayLeft.style.opacity  = 0;
      if (Math.abs(dx) >= THRESHOLD) {
        swipe(dx > 0 ? "right" : "left");
      } else {
        card.style.transition = "transform 300ms ease";
        card.style.transform  = "";
      }
    }

    // Touch
    card.addEventListener("touchstart",  e => onStart(e.touches[0].clientX), { passive: true });
    card.addEventListener("touchmove",   e => onMove(e.touches[0].clientX),  { passive: true });
    card.addEventListener("touchend",    onEnd);
    card.addEventListener("touchcancel", onEnd);

    // Mouse
    card.addEventListener("mousedown",  e => { e.preventDefault(); onStart(e.clientX); });
    window.addEventListener("mousemove", e => onMove(e.clientX));
    window.addEventListener("mouseup",   onEnd);
  }

  // ── Keyboard ──────────────────────────────────────────────────────────────
  document.addEventListener("keydown", e => {
    if (e.key === "ArrowRight" || e.key === "l") swipe("right");
    if (e.key === "ArrowLeft"  || e.key === "h") swipe("left");
  });

  // ── Load ──────────────────────────────────────────────────────────────────
  async function load() {
    show("screen-loading");
    try {
      const res = await fetch(`${API_BASE}/api/swipe-queue?date=${todayLocal()}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      queue = data.jobs || [];
      total = data.count || queue.length;
      currentIdx = 0;

      if (queue.length === 0) {
        show("screen-done");
        setTimeout(() => { window.location.href = "index.html"; }, 2200);
        return;
      }

      show("swipe-ui");
      updateProgress();
      renderStack();
    } catch (err) {
      document.getElementById("error-msg").textContent = err.message;
      show("screen-error");
    }
  }

  load();
</script>
</body>
</html>
