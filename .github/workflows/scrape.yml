name: Job Pipeline — Scrape & Deploy

on:
  schedule:
    - cron: "0 * * * *"   # every hour at :00 (fresh IP from GitHub's Azure pool)
  workflow_dispatch:       # manual trigger from the Actions tab

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore today_jobs.json from the dashboard so the already-seen
      # dedup filter works correctly across hourly runs.
      - name: Restore today_jobs.json from dashboard
        run: |
          mkdir -p output
          curl -sf \
            "https://raw.githubusercontent.com/atriveo-airflow/atriveo-airflow.github.io/main/docs/today_jobs.json" \
            -o output/today_jobs.json \
            || echo "[]" > output/today_jobs.json
          echo "today_jobs restored: $(python -c "import json; print(len(json.load(open('output/today_jobs.json'))))" ) jobs"

      # Restore run_history.json so the hourly chip history is preserved.
      - name: Restore run_history.json from dashboard
        run: |
          curl -sf \
            "https://raw.githubusercontent.com/atriveo-airflow/atriveo-airflow.github.io/main/docs/run_history.json" \
            -o output/run_history.json \
            || echo "[]" > output/run_history.json

      - name: Run all pipelines + deploy to dashboard
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: python -m job_pipeline.main --pipeline all --deploy
