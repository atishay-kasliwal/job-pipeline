name: Update Job Data

on:
  schedule:
    # Every hour at :30, 7am–12pm ET (11:30–16:30 UTC); note: shifts 1h in winter (EST)
    - cron: "30 11-16 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-job-data
  cancel-in-progress: true

jobs:
  export-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout job-pipeline repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install "pymongo[srv]>=4.6.0" "pandas>=2.0.0" "python-dotenv>=1.0.0"

      - name: Export job data from MongoDB → docs/
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: python -m job_pipeline.export_static

      - name: Checkout atriveo-app repo
        uses: actions/checkout@v4
        with:
          repository: atishay-kasliwal/atriveo-app
          token: ${{ secrets.ATRIVEO_APP_TOKEN }}
          path: atriveo-app

      - name: Copy JSON files to atriveo-app/public/
        run: |
          mkdir -p atriveo-app/public
          cp docs/jobs.json           atriveo-app/public/
          cp docs/important_jobs.json atriveo-app/public/
          cp docs/today_jobs.json     atriveo-app/public/
          cp docs/yesterday_jobs.json atriveo-app/public/
          cp docs/week_jobs.json      atriveo-app/public/
          cp docs/run_history.json    atriveo-app/public/
          cp docs/metadata.json       atriveo-app/public/

      - name: Commit and push to atriveo-app
        run: |
          cd atriveo-app
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/
          git diff --staged --quiet \
            && echo "No changes to commit." \
            || (git commit -m "chore: update job data $(date -u +'%Y-%m-%dT%H:%M:%SZ')" && git push)
