name: Update Job Data

on:
  schedule:
    # Every hour at :30, 7am–12pm ET (11:30–16:30 UTC); note: shifts 1h in winter (EST)
    - cron: "30 11-16 * * *"
  workflow_dispatch:
    inputs:
      resume_text:
        description: "Resume text for ATS/Fit scoring (updates stored resume)"
        required: false
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  group: update-job-data
  cancel-in-progress: false

jobs:
  export-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout job-pipeline repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install "pymongo[srv]>=4.6.0" "pandas>=2.0.0" "python-dotenv>=1.0.0" "scikit-learn>=1.3.0"

      - name: Export job data from MongoDB → docs/
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          RESUME_TEXT: ${{ inputs.resume_text }}
        run: python -m job_pipeline.export_static

      - name: Checkout atriveo-app repo
        uses: actions/checkout@v4
        with:
          repository: atishay-kasliwal/atriveo-app
          token: ${{ secrets.ATRIVEO_APP_TOKEN }}
          path: atriveo-app

      - name: Copy JSON files to atriveo-app/public/
        run: |
          mkdir -p atriveo-app/public
          cp docs/jobs.json              atriveo-app/public/
          cp docs/important_jobs.json    atriveo-app/public/
          cp docs/today_jobs.json        atriveo-app/public/
          cp docs/yesterday_jobs.json    atriveo-app/public/
          cp docs/week_jobs.json         atriveo-app/public/
          cp docs/run_history.json       atriveo-app/public/
          cp docs/metadata.json          atriveo-app/public/
          cp docs/skills_summary.json    atriveo-app/public/
          cp docs/index.html             atriveo-app/public/
          cp docs/dashboard.html         atriveo-app/public/
          cp docs/unclicked_100.html     atriveo-app/public/
          cp docs/weekly.html            atriveo-app/public/

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: atriveo-app/package-lock.json

      - name: Regenerate full-JD description buckets
        # Rebuilds public/job_descriptions/*.json from MongoDB so the app's
        # "Full Job Description" export stays in sync with the jobs just copied
        # above. Without this the buckets go stale and exports fall back to the
        # short summary. Non-fatal: a failure here must not block the data push.
        working-directory: atriveo-app
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          npm ci
          npm run jd:export || echo "jd:export failed (non-fatal) — buckets not refreshed this run"

      - name: Commit and push to atriveo-app
        run: |
          cd atriveo-app
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/
          git diff --staged --quiet \
            && echo "No changes to commit." \
            || (git commit -m "chore: update job data $(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
                && for i in 1 2 3; do git push && break || (echo "Push attempt $i failed, retrying..."; sleep 10); done)
